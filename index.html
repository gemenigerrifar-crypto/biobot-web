<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioHacker Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #1c1c1d);
            color: var(--tg-theme-text-color, #ffffff);
            padding: 20px;
            margin: 0;
        }
        .container { display: flex; flex-direction: column; gap: 15px; }
        label { font-weight: bold; font-size: 14px; color: #a1a1aa; }
        input[type="number"], input[type="range"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #3f3f46;
            background: #27272a;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            margin-top: 5px;
        }
        .slider-value { text-align: center; font-size: 18px; font-weight: bold; margin-top: 5px; color: #10b981; }
        button {
            background-color: #10b981;
            color: #ffffff;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="margin: 0; text-align: center;">Утренний чек-ап</h2>
        
        <div>
            <label>❤️ RHR (Пульс покоя)</label>
            <input type="number" id="rhr" inputmode="numeric" placeholder="Например: 55">
        </div>

        <div>
            <label>⚡️ HRV (Вариабельность)</label>
            <input type="number" id="hrv" inputmode="numeric" placeholder="Например: 48">
        </div>

        <div>
            <label>🧠 Самочувствие (1-10)</label>
            <input type="range" id="wellbeing" min="1" max="10" value="8" oninput="updateVal('wb_val', this.value)">
            <div class="slider-value" id="wb_val">8</div>
        </div>

        <div>
            <label>💤 Качество сна (1-100)</label>
            <input type="range" id="sleep_score" min="1" max="100" value="85" oninput="updateVal('slp_val', this.value)">
            <div class="slider-value" id="slp_val">85</div>
        </div>

        <div>
            <label>👅 Налет на языке (Ама)</label>
            <p style="font-size: 12px; margin: 5px 0; color: #a1a1aa;">1 - чистый, 3 - белый, 5 - плотный белый/желтый</p>
            <input type="range" id="tongue" min="1" max="5" value="1" oninput="updateVal('tng_val', this.value)">
            <div class="slider-value" id="tng_val">1</div>
        </div>

        <button onclick="sendData()">Отправить метрики</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function updateVal(id, val) {
            document.getElementById(id).innerText = val;
        }

        function sendData() {
            const data = {
                rhr: document.getElementById('rhr').value,
                hrv: document.getElementById('hrv').value,
                wellbeing: document.getElementById('wellbeing').value,
                sleep_score: document.getElementById('sleep_score').value,
                tongue: document.getElementById('tongue').value
            };

            if(!data.rhr || !data.hrv) {
                tg.showAlert("Введите RHR и HRV!");
                return;
            }

            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
