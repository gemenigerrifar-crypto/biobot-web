<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioBot Control Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #1c1c1d; --card: #2c2c2e; --text: #ffffff; --green: #30d158; --accent: #0a84ff; }
        body { font-family: -apple-system, system-ui; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .section { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #3a3a3c; }
        h3 { margin: 0 0 10px 0; font-size: 16px; color: #a1a1aa; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input[type="number"] { width: 100%; padding: 10px; background: #3a3a3c; border: none; border-radius: 8px; color: white; box-sizing: border-box; }
        .check-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #3a3a3c; }
        .check-item:last-child { border: none; }
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--green); }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--green); color: white; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .slider-val { font-weight: bold; color: var(--green); }
    </style>
</head>
<body>
    <div class="section">
        <h3>📊 Утренние Метрики</h3>
        <div class="grid">
            <div><label>RHR</label><input type="number" id="rhr" placeholder="Пульс"></div>
            <div><label>HRV</label><input type="number" id="hrv" placeholder="Вариаб."></div>
        </div>
        <div style="margin-top:10px">
            <label>Налет (1-5): <span id="t_v" class="slider-val">1</span></label>
            <input type="range" id="tongue" min="1" max="5" value="1" style="width:100%" oninput="document.getElementById('t_v').innerText=this.value">
        </div>
    </div>

    <div class="section">
        <h3>💊 Чек-лист приема</h3>
        <div id="check-list">
            <div class="check-item"><span>Ашвагандха + MCT</span><input type="checkbox" class="supp" value="ashwa_mct"></div>
            <div class="check-item"><span>Спирулина</span><input type="checkbox" class="supp" value="spirulina"></div>
            <div class="check-item"><span>Чай Tulsi/Ginger (Днем)</span><input type="checkbox" class="supp" value="tulsi_day"></div>
            <div class="check-item"><span>Энтеросгель</span><input type="checkbox" class="supp" value="gel"></div>
            <div class="check-item"><span>Орехи (Пекан/Бразильский)</span><input type="checkbox" class="supp" value="nuts"></div>
            <div class="check-item"><span>Магний + Трифала (Вечер)</span><input type="checkbox" class="supp" value="evening_stack"></div>
        </div>
    </div>

    <button onclick="sendData()">ОТПРАВИТЬ ОТЧЕТ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        function sendData() {
            const checks = Array.from(document.querySelectorAll('.supp:checked')).map(el => el.value);
            const data = {
                rhr: document.getElementById('rhr').value || 0,
                hrv: document.getElementById('hrv').value || 0,
                tongue: document.getElementById('tongue').value,
                wellbeing: 8, // Дефолт, если не трогали ползунок
                sleep_score: 85,
                taken: checks
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
