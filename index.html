<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioBot v8.1</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #1c1c1e; --card: #2c2c2e; --green: #30d158; --text: #ffffff; }
        body { font-family: -apple-system, system-ui; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .section { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #38383a; }
        h3 { margin: 0 0 10px 0; font-size: 14px; color: #8e8e93; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input[type="number"] { width: 100%; padding: 12px; background: #1c1c1e; border: none; border-radius: 8px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--green); color: white; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .report-btn { background: #007AFF; }
    </style>
</head>
<body>
    <div class="section">
        <h3>Метрики с часов</h3>
        <div class="grid">
            <div><label style="font-size:12px">RHR (Пульс)</label><input type="number" id="rhr" placeholder="52"></div>
            <div><label style="font-size:12px">HRV (Вариаб.)</label><input type="number" id="hrv" placeholder="48"></div>
        </div>
        <div style="margin-top:10px">
            <label style="font-size:12px">Sleep Score (Сон 0-100)</label>
            <input type="number" id="sleep_score" placeholder="85">
        </div>
        <div style="margin-top:10px">
            <label style="font-size:12px">Самочувствие (1-10)</label>
            <input type="number" id="wellbeing" placeholder="8">
        </div>
    </div>

    <button onclick="sendToBot()">ОТПРАВИТЬ ОТЧЁТ</button>
    <button onclick="requestReport()" class="report-btn">📊 ОТЧЁТ ЗА СЕГОДНЯ</button>

    <script>
        const tg = window.Telegram.WebApp;
        
        function sendToBot() {
            const rhr = document.getElementById('rhr').value;
            const hrv = document.getElementById('hrv').value;
            const sleep = document.getElementById('sleep_score').value;
            const wellbeing = document.getElementById('wellbeing').value;

            if (!rhr || !hrv || !sleep || !wellbeing) {
                tg.showAlert("⚠️ Заполни все поля!");
                return;
            }

            const data = {
                rhr: parseInt(rhr),
                hrv: parseInt(hrv),
                sleep_score: parseInt(sleep),
                wellbeing: parseInt(wellbeing)
            };

            tg.sendData(JSON.stringify(data));
            tg.close();
        }

        function requestReport() {
            tg.sendData(JSON.stringify({action: "report"}));
            tg.close();
        }
    </script>
</body>
</html>
