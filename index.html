<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioHacker Protocol</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            margin: 0;
        }
        .container { display: flex; flex-direction: column; gap: 15px; }
        .card {
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 12px;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        button {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Утренний статус</h2>
    
    <div class="card">
        <label for="rhr">❤️ RHR (Пульс покоя):</label>
        <input type="number" id="rhr" placeholder="Например: 68">
    </div>

    <div class="card">
        <label for="hrv">⚡️ HRV (Вариабельность):</label>
        <input type="number" id="hrv" placeholder="Например: 44">
    </div>

    <div class="card">
        <label>
            <input type="checkbox" id="ashwagandha"> Ашвагандха (2 капсулы) выпита
        </label>
    </div>

    <button onclick="sendDataToBot()">Сохранить метрики</button>
</div>

<script>
    // Инициализация приложения Telegram
    let tg = window.Telegram.WebApp;
    tg.expand(); // Разворачиваем на весь экран

    function sendDataToBot() {
        const rhr = document.getElementById('rhr').value;
        const hrv = document.getElementById('hrv').value;
        const ashwa = document.getElementById('ashwagandha').checked;

        if (!rhr || !hrv) {
            tg.showAlert("Введи значения RHR и HRV!");
            return;
        }

        // Собираем данные в JSON
        const data = {
            action: "morning_update",
            rhr: rhr,
            hrv: hrv,
            ashwa_taken: ashwa
        };

        // Отправляем данные обратно в бота и закрываем окно
        tg.sendData(JSON.stringify(data));
        tg.close();
    }
</script>

</body>
</html>
