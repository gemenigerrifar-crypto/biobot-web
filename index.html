<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioBot v5.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #1c1c1e; --card: #2c2c2e; --green: #30d158; --text: #ffffff; }
        body { font-family: -apple-system, system-ui; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .section { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #38383a; }
        h3 { margin: 0 0 10px 0; font-size: 14px; color: #8e8e93; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input[type="number"] { width: 100%; padding: 12px; background: #1c1c1e; border: none; border-radius: 8px; color: white; box-sizing: border-box; }
        .check-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #38383a; }
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--green); }
        button { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--green); color: white; font-weight: bold; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="section">
        <h3>☀️ Утренние данные</h3>
        <div class="grid">
            <div><label style="font-size:12px">RHR (Пульс)</label><input type="number" id="rhr" placeholder="60"></div>
            <div><label style="font-size:12px">HRV (Вариаб.)</label><input type="number" id="hrv" placeholder="50"></div>
        </div>
    </div>

    <div class="section">
        <h3>💊 Чек-лист за день</h3>
        <div id="check-list">
            <div class="check-item"><span>Утренний стек (Мумие/Ашва/Спир)</span><input type="checkbox" class="log" value="morning_meds"></div>
            <div class="check-item"><span>Завтрак + MCT</span><input type="checkbox" class="log" value="breakfast_mct"></div>
            <div class="check-item"><span>Энтеросгель (Детокс)</span><input type="checkbox" class="log" value="gel"></div>
            <div class="check-item"><span>Обед + Орехи (Пекан/Бразильский)</span><input type="checkbox" class="log" value="lunch"></div>
            <div class="check-item"><span>Полдник + Макадамия</span><input type="checkbox" class="log" value="dinner"></div>
            <div class="check-item"><span>Вечерний стек (Магний/Трифала)</span><input type="checkbox" class="log" value="evening_meds"></div>
        </div>
    </div>

    <div class="section">
        <h3>🌙 Вечер</h3>
        <label>Налет (1-5): <span id="t_v" style="color:var(--green)">1</span></label>
        <input type="range" id="tongue" min="1" max="5" value="1" style="width:100%" oninput="document.getElementById('t_v').innerText=this.value">
    </div>

    <button onclick="sendToBot()">ОТПРАВИТЬ ОТЧЕТ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        function sendToBot() {
            const checks = Array.from(document.querySelectorAll('.log:checked')).map(el => el.value);
            const data = {
                rhr: document.getElementById('rhr').value || 0,
                hrv: document.getElementById('hrv').value || 0,
                tongue: document.getElementById('tongue').value,
                wellbeing: 8,
                taken: checks
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
